<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- Background Sky -->
  <rect width="800" height="600" fill="#87CEEB"/>
  
  <!-- Sun -->
  <circle cx="700" cy="100" r="60" fill="#FFD700"/>
  
  <!-- Mountains in background -->
  <polygon points="0,300 100,200 200,250 300,150 400,200 500,100 600,200 700,150 800,250 800,600 0,600" fill="#6B8E23"/>
  
  <!-- Main Campus Building -->
  <rect x="150" y="250" width="500" height="200" fill="#F5F5DC"/>
  
  <!-- Building Windows -->
  <rect x="180" y="280" width="40" height="60" fill="#87CEFA"/>
  <rect x="240" y="280" width="40" height="60" fill="#87CEFA"/>
  <rect x="300" y="280" width="40" height="60" fill="#87CEFA"/>
  <rect x="360" y="280" width="40" height="60" fill="#87CEFA"/>
  <rect x="420" y="280" width="40" height="60" fill="#87CEFA"/>
  <rect x="480" y="280" width="40" height="60" fill="#87CEFA"/>
  <rect x="540" y="280" width="40" height="60" fill="#87CEFA"/>
  
  <!-- Second row of windows -->
  <rect x="180" y="360" width="40" height="60" fill="#87CEFA"/>
  <rect x="240" y="360" width="40" height="60" fill="#87CEFA"/>
  <rect x="300" y="360" width="40" height="60" fill="#87CEFA"/>
  <rect x="360" y="360" width="40" height="60" fill="#87CEFA"/>
  <rect x="420" y="360" width="40" height="60" fill="#87CEFA"/>
  <rect x="480" y="360" width="40" height="60" fill="#87CEFA"/>
  <rect x="540" y="360" width="40" height="60" fill="#87CEFA"/>
  
  <!-- Building Roof -->
  <polygon points="100,250 150,250 150,200 400,150 650,200 650,250 700,250" fill="#8B4513"/>
  
  <!-- Building Entrance -->
  <rect x="350" y="370" width="100" height="80" fill="#8B4513"/>
  <rect x="380" y="390" width="40" height="60" fill="#4682B4"/>
  
  <!-- Flagpole -->
  <rect x="400" y="100" width="5" height="100" fill="#808080"/>
  <rect x="405" y="100" width="30" height="20" fill="#FF0000"/>
  
  <!-- Trees -->
  <circle cx="100" cy="400" r="30" fill="#228B22"/>
  <rect x="95" y="400" width="10" height="50" fill="#8B4513"/>
  
  <circle cx="700" cy="400" r="30" fill="#228B22"/>
  <rect x="695" y="400" width="10" height="50" fill="#8B4513"/>
  
  <circle cx="150" cy="450" r="25" fill="#228B22"/>
  <rect x="145" y="450" width="10" height="40" fill="#8B4513"/>
  
  <circle cx="650" cy="450" r="25" fill="#228B22"/>
  <rect x="645" y="450" width="10" height="40" fill="#8B4513"/>
  
  <!-- Path to building -->
  <rect x="350" y="450" width="100" height="150" fill="#D3D3D3"/>
  
  <!-- Text Label -->
  <text x="400" y="550" font-family="Arial" font-size="24" text-anchor="middle" fill="#000000">ITERA CAMPUS</text>
</svg>